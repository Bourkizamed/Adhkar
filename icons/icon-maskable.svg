<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed gold background (maskable safe zone = radius 204 from center) -->
  <rect width="512" height="512" fill="#c8962a"/>
  <!-- Depth ring -->
  <circle cx="256" cy="256" r="195" fill="#b8802a" opacity="0.45"/>
  <!-- Bead connection ring -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="#fdfaf4" stroke-width="2.5" opacity="0.35"/>
  <!-- 12 prayer beads at radius 165 (all within maskable safe zone of 204px) -->
  <!-- 0°   --> <circle cx="256"   cy="91"   r="18" fill="#fdfaf4"/>
  <!-- 30°  --> <circle cx="338.5" cy="113"  r="14" fill="#fdfaf4" opacity="0.88"/>
  <!-- 60°  --> <circle cx="399"   cy="173.5" r="14" fill="#fdfaf4" opacity="0.88"/>
  <!-- 90°  --> <circle cx="421"   cy="256"  r="18" fill="#fdfaf4"/>
  <!-- 120° --> <circle cx="399"   cy="338.5" r="14" fill="#fdfaf4" opacity="0.88"/>
  <!-- 150° --> <circle cx="338.5" cy="399"  r="14" fill="#fdfaf4" opacity="0.88"/>
  <!-- 180° --> <circle cx="256"   cy="421"  r="18" fill="#fdfaf4"/>
  <!-- 210° --> <circle cx="173.5" cy="399"  r="14" fill="#fdfaf4" opacity="0.88"/>
  <!-- 240° --> <circle cx="113"   cy="338.5" r="14" fill="#fdfaf4" opacity="0.88"/>
  <!-- 270° --> <circle cx="91"    cy="256"  r="18" fill="#fdfaf4"/>
  <!-- 300° --> <circle cx="113"   cy="173.5" r="14" fill="#fdfaf4" opacity="0.88"/>
  <!-- 330° --> <circle cx="173.5" cy="113"  r="14" fill="#fdfaf4" opacity="0.88"/>
  <!-- Separator indicator on top bead -->
  <circle cx="256" cy="91" r="21" fill="none" stroke="#f5e8c0" stroke-width="2.5"/>
  <!-- White center plate -->
  <circle cx="256" cy="256" r="105" fill="#fdfaf4"/>
  <!-- Inner gold ring -->
  <circle cx="256" cy="256" r="82" fill="none" stroke="#c8962a" stroke-width="4"/>
  <!-- Four-petal geometric motif -->
  <ellipse cx="256" cy="228" rx="11" ry="20" fill="#c8962a" opacity="0.85"/>
  <ellipse cx="284" cy="256" rx="20" ry="11" fill="#c8962a" opacity="0.85"/>
  <ellipse cx="256" cy="284" rx="11" ry="20" fill="#c8962a" opacity="0.85"/>
  <ellipse cx="228" cy="256" rx="20" ry="11" fill="#c8962a" opacity="0.85"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="15" fill="#c8962a"/>
</svg>
